<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f1ead8"/>
<title>ADICTO Reports</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #f1ead8; min-height: 100vh; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: #1a1510;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  * { box-sizing: border-box; }
  button:focus { outline: none; }
  ::-webkit-scrollbar { display: none; }

  @media (min-width: 520px) {
    body { padding: 24px 0; }
    #root { max-width: 420px; margin: 0 auto; background: #f1ead8;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 20px 60px rgba(0,0,0,0.12);
      border-radius: 28px; overflow: hidden; min-height: calc(100vh - 48px); }
  }
  @media (max-width: 519px) {
    #root { min-height: 100vh; }
  }
</style>

<script>
  window.ADICTO_CONFIG = {
    apiUrl: 'https://script.google.com/macros/s/AKfycbwD65o7RNMwU1QSVtJqrEEJCQjB-O1Zo3DrzGRvnTHDS7XXQsgKcQ3xAFJIQG4xyNW4fQ/exec',
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root">
  <div style="padding:80px 40px;text-align:center;font-family:'JetBrains Mono',monospace;color:#8a7d69;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;">Loading…</div>
</div>

<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="Aggregator.jsx"></script>
<script type="text/babel" src="DataStore.jsx"></script>
<script type="text/babel" src="PullToRefresh.jsx"></script>
<script type="text/babel" src="MoreExtras.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="Auth.jsx"></script>
<script type="text/babel" src="LiveAI.jsx"></script>

<script type="text/babel">
  const { useDataStore } = window.DATA_STORE;
  const { aggregateSales, aggregateTraffic, computeRatio } = window.AGGREGATOR;
  const { SalesScreen, TrafficScreen, HomeScreen, InfoScreen, MoreScreen, EmptyState, LastUpdatedFooter, AdictoLogo } = window.SCREENS;
  const { PALETTE } = window.CHARTS;
  const { PullToRefresh } = window.PTR;
  const { LoginScreen, checkSession, clearSession } = window.AUTH;

  const MONO = '"JetBrains Mono", ui-monospace, monospace';

  // Minimal line icons (24x24) — home, euro, person, lines, gear
  const ICONS = {
    home:    (c) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>,
    euro:    (c) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M19 5.5A8 8 0 0 0 7.2 15.4 8 8 0 0 0 19 18.5"/><path d="M4 10h10"/><path d="M4 14h9"/></svg>,
    person:  (c) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>,
    info:    (c) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v6"/><circle cx="12" cy="8" r="0.8" fill={c}/></svg>,
    gear:    (c) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12c0-.5 0-1-.1-1.5l2.1-1.6-2-3.4-2.4 1a7 7 0 0 0-2.6-1.5L13.6 2h-3.2l-.4 3a7 7 0 0 0-2.6 1.5l-2.4-1-2 3.4 2.1 1.6c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2.1 1.6 2 3.4 2.4-1a7 7 0 0 0 2.6 1.5l.4 3h3.2l.4-3a7 7 0 0 0 2.6-1.5l2.4 1 2-3.4-2.1-1.6c.1-.5.1-1 .1-1.5Z"/></svg>,
  };

  const TABS = [
    { id: 'home',    label: 'Home',    icon: 'home'   },
    { id: 'sales',   label: 'Sales',   icon: 'euro'   },
    { id: 'traffic', label: 'Traffic', icon: 'person' },
    { id: 'info',    label: 'Info',    icon: 'info'   },
    { id: 'more',    label: 'More',    icon: 'gear'   },
  ];

  function TabBar({ current, onTab, accent }) {
    return (
      <div style={{
        position: 'sticky', bottom: 0, left: 0, right: 0,
        background: 'rgba(253, 249, 238, 0.92)',
        backdropFilter: 'blur(20px) saturate(180%)',
        WebkitBackdropFilter: 'blur(20px) saturate(180%)',
        borderTop: `1px solid ${PALETTE.line}`,
        display: 'flex', padding: '6px 0 max(6px, env(safe-area-inset-bottom))',
        zIndex: 40,
      }}>
        {TABS.map(t => {
          const active = current === t.id;
          const color = active ? PALETTE.ink : PALETTE.muted;
          return (
            <button key={t.id} onClick={() => onTab(t.id)} style={{
              flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              padding: '4px 2px',
            }}>
              {ICONS[t.icon](color)}
              <div style={{
                fontFamily: MONO, fontSize: 8.5, letterSpacing: 0.6,
                textTransform: 'uppercase', color,
                fontWeight: active ? 600 : 400,
              }}>{t.label}</div>
            </button>
          );
        })}
      </div>
    );
  }

  function TopBar({ onRefresh, loading, source, error, onLiveAI }) {
    const dot = source === 'live' ? '#7aa875' : source === 'cache' ? '#c4a04e' : PALETTE.muted;
    return (
      <div style={{
        position: 'sticky', top: 0, zIndex: 30,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '10px 16px', gap: 10,
        background: 'rgba(241, 234, 216, 0.92)',
        backdropFilter: 'blur(20px)',
        WebkitBackdropFilter: 'blur(20px)',
        borderBottom: `1px solid ${PALETTE.line}`,
        fontFamily: MONO,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <AdictoLogo size={13}/>
          <div style={{ fontSize: 10, letterSpacing: 1.1, textTransform: 'uppercase', color: PALETTE.ink, fontWeight: 600 }}>ADICTO.BIKE</div>
        </div>
        {onLiveAI && <window.LiveAIButton onClick={onLiveAI}/>}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            width: 6, height: 6, borderRadius: 3,
            background: error ? '#c47862' : dot,
            animation: loading ? 'pulse 1.4s ease-in-out infinite' : 'none',
          }}/>
          <button onClick={onRefresh} disabled={loading} style={{
            background: 'transparent', border: `1px solid ${PALETTE.line}`,
            borderRadius: 100, padding: '5px 11px', cursor: loading ? 'default' : 'pointer',
            fontFamily: MONO, fontSize: 9, letterSpacing: 0.8, textTransform: 'uppercase',
            color: PALETTE.ink, opacity: loading ? 0.5 : 1,
          }}>
            {loading ? '↻' : '↻ Оновити'}
          </button>
        </div>
      </div>
    );
  }

  function ErrorBanner({ error, onDismiss }) {
    if (!error) return null;
    return (
      <div style={{
        margin: '10px 16px', padding: '10px 12px',
        background: '#fdf4e8', border: '1px solid #e6c9a3', borderRadius: 10,
        fontFamily: MONO, fontSize: 10, color: '#8a5a2a', display: 'flex',
        justifyContent: 'space-between', alignItems: 'center',
      }}>
        <span>Не вдалось оновити: {error}. Показую збережені дані.</span>
        <button onClick={onDismiss} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#8a5a2a', fontSize: 14, padding: 0 }}>×</button>
      </div>
    );
  }

  // Skeleton — показується коли ще немає даних, але fetch у процесі
  function Skeleton() {
    return (
      <div style={{ padding: '20px 16px' }}>
        <div style={{ fontFamily: MONO, fontSize: 9, letterSpacing: 1.2,
          textTransform: 'uppercase', color: PALETTE.muted, marginBottom: 10 }}>
          <span style={{ display: 'inline-block', width: 10, height: 10, border: `2px solid ${PALETTE.line}`,
            borderTopColor: PALETTE.ink, borderRadius: '50%', marginRight: 8, verticalAlign: -1,
            animation: 'spin 0.8s linear infinite' }}/>
          Завантаження даних
        </div>
        {[1,2,3].map(i => (
          <div key={i} style={{
            height: 80, background: '#fffbf0', border: `1px solid ${PALETTE.line}`,
            borderRadius: 12, marginBottom: 10,
            backgroundImage: `linear-gradient(90deg, transparent, ${PALETTE.paperLight}, transparent)`,
            backgroundSize: '200% 100%',
            animation: 'shimmer 1.8s ease-in-out infinite',
          }}/>
        ))}
      </div>
    );
  }

  // Swipe handler — hook
  function useSwipe(tab, tabs, setTab) {
    const startX = React.useRef(null);
    const startY = React.useRef(null);

    const onTouchStart = (e) => {
      startX.current = e.touches[0].clientX;
      startY.current = e.touches[0].clientY;
    };
    const onTouchEnd = (e) => {
      if (startX.current == null) return;
      const dx = e.changedTouches[0].clientX - startX.current;
      const dy = e.changedTouches[0].clientY - startY.current;
      startX.current = startY.current = null;
      // Мінімум 60px горизонталь, максимум 40px вертикаль
      if (Math.abs(dx) < 60 || Math.abs(dy) > 40) return;
      const idx = tabs.findIndex(t => t.id === tab);
      if (idx < 0) return;
      if (dx < 0 && idx < tabs.length - 1) setTab(tabs[idx + 1].id);
      if (dx > 0 && idx > 0) setTab(tabs[idx - 1].id);
    };
    return { onTouchStart, onTouchEnd };
  }

  function App() {
    const [session, setSession] = React.useState(() => checkSession());
    const store = useDataStore();
    const [tab, setTab] = React.useState(() => localStorage.getItem('adicto.tab') || 'home');
    const [period, setPeriod] = React.useState(() => localStorage.getItem('adicto.period') || 'all');
    const [customRange, setCustomRange] = React.useState(() => {
      try { return JSON.parse(localStorage.getItem('adicto.customRange') || 'null') || { from:'', to:'' }; }
      catch { return { from:'', to:'' }; }
    });
    const [maxCheck, setMaxCheck] = React.useState(() => {
      const v = localStorage.getItem('adicto.maxCheck');
      return v ? (v === 'inf' ? Infinity : parseInt(v, 10)) : Infinity;
    });
    const [errorShown, setErrorShown] = React.useState(true);
    const [liveAIOpen, setLiveAIOpen] = React.useState(false);
    const accent = 'rgb(92, 158, 219)';

    const handleLogout = () => {
      clearSession();
      setSession(null);
    };

    React.useEffect(() => { localStorage.setItem('adicto.tab', tab); }, [tab]);
    React.useEffect(() => { localStorage.setItem('adicto.period', period); }, [period]);
    React.useEffect(() => { localStorage.setItem('adicto.customRange', JSON.stringify(customRange)); }, [customRange]);
    React.useEffect(() => { localStorage.setItem('adicto.maxCheck', maxCheck === Infinity ? 'inf' : String(maxCheck)); }, [maxCheck]);

    // Опції для агрегатора
    const aggOpts = period === 'custom' && customRange.from && customRange.to
      ? { from: customRange.from, to: customRange.to, maxCheck }
      : period !== 'all' && period !== 'custom'
        ? { periodDays: parseInt(period, 10), maxCheck }
        : { maxCheck };

    // Приймаємо обидва формати відповіді: { sales: [...] } (новий) або { sales: { rows: [...] } } (старий)
    const salesRows = React.useMemo(() => {
      const s = store.payload?.sales;
      return Array.isArray(s) ? s : (s?.rows || []);
    }, [store.payload]);
    const trafficRows = React.useMemo(() => {
      const t = store.payload?.traffic;
      return Array.isArray(t) ? t : (t?.rows || []);
    }, [store.payload]);

    const sales = React.useMemo(() =>
      salesRows.length ? aggregateSales(salesRows, aggOpts) : aggregateSales([])
    , [salesRows, period, customRange.from, customRange.to, maxCheck]);

    const traffic = React.useMemo(() =>
      trafficRows.length ? aggregateTraffic(trafficRows, aggOpts) : aggregateTraffic([])
    , [trafficRows, period, customRange.from, customRange.to]);

    const ratio = React.useMemo(() => computeRatio(sales, traffic), [sales, traffic]);

    const hasData = store.payload && (sales.count || traffic.count);
    // hasAnyData — чи взагалі є завантажений payload (навіть якщо поточний фільтр дає 0 рядків).
    // Використовуємо для того, щоб при зміні дати на період без даних екран не ховався.
    const hasAnyData = !!store.payload;
    const swipe = useSwipe(tab, TABS, setTab);

    // Export PDF: відкриває чисту print-версію поточного екрану
    const onExportPdf = () => {
      const screenEl = document.querySelector('[data-export-root]');
      if (!screenEl) return window.print();
      const html = `<!doctype html><html><head><meta charset="utf-8"/>
        <title>ADICTO · ${tab}</title>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
          body { font-family: 'JetBrains Mono', monospace; background: #f1ead8; color: #1a1510; margin: 32px; }
          button { display: none !important; }
          @media print { body { margin: 16px; } }
        </style></head><body>${screenEl.outerHTML}
        <script>window.addEventListener('load', () => setTimeout(() => window.print(), 400));<\/script>
        </body></html>`;
      const w = window.open('', '_blank');
      if (w) { w.document.write(html); w.document.close(); }
    };

    // Рендер основного body
    let body;
    if (!session) {
      return <LoginScreen onLogin={(email) => setSession({ email, loggedAt: Date.now() })}/>;
    }
    // Info/More завжди доступні, незалежно від даних
    const alwaysOnTab = (tab === 'info' || tab === 'more');
    if (!hasAnyData && store.loading && !alwaysOnTab) {
      body = <Skeleton/>;
    } else if (!hasAnyData && store.error && !alwaysOnTab) {
      body = (
        <div style={{ padding: '60px 40px', textAlign: 'center', fontFamily: MONO, maxWidth: 360, margin: '0 auto' }}>
          <div style={{ fontSize: 32, marginBottom: 16 }}>⚠</div>
          <div style={{ fontSize: 14, color: PALETTE.ink, marginBottom: 12, fontWeight: 500 }}>Не вдалось отримати дані</div>
          <div style={{ fontSize: 10, color: PALETTE.subtle, lineHeight: 1.6, marginBottom: 20 }}>{store.error}</div>
          <button onClick={store.refresh} style={{
            background: PALETTE.ink, color: '#f1ead8', border: 'none', borderRadius: 100,
            padding: '10px 20px', fontFamily: MONO, fontSize: 10, letterSpacing: 1,
            textTransform: 'uppercase', cursor: 'pointer',
          }}>Спробувати ще раз</button>
        </div>
      );
    } else if (!hasAnyData && !alwaysOnTab) {
      body = <EmptyState msg="Немає даних. Натисніть «Оновити»."/>;
    } else {
      body = tab === 'home'    ? <HomeScreen sales={sales} traffic={traffic} accent={accent} updated={store.payload?.updated} source={store.source} userEmail={session.email}/>
           : tab === 'sales'   ? <SalesScreen data={sales} accent={accent} period={period} onPeriodChange={setPeriod}
               customRange={customRange} onCustomChange={setCustomRange}
               maxCheck={maxCheck} onMaxCheckChange={setMaxCheck}
               userEmail={session.email} onExportPdf={onExportPdf}/>
           : tab === 'traffic' ? <TrafficScreen data={traffic} accent={accent} period={period} onPeriodChange={setPeriod}
               customRange={customRange} onCustomChange={setCustomRange} ratio={ratio} userEmail={session.email} onExportPdf={onExportPdf}/>
           : tab === 'info'    ? <InfoScreen/>
           :                     <MoreScreen userEmail={session.email} onLogout={handleLogout}/>;
    }

    const footer = (tab !== 'more' && tab !== 'info' && hasAnyData) ? (
      <LastUpdatedFooter
        updated={store.payload?.updated}
        savedAt={store.savedAt}
        source={store.source}
        loading={store.loading}
        onRefresh={store.refresh}
      />
    ) : null;

    return (
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
        <TopBar onRefresh={store.refresh} loading={store.loading} source={store.source}
          error={errorShown ? store.error : null}
          onLiveAI={hasAnyData ? () => setLiveAIOpen(true) : null}/>
        {errorShown && store.error && hasAnyData && <ErrorBanner error={store.error} onDismiss={() => setErrorShown(false)}/>}
        <div style={{ flex: 1 }} onTouchStart={swipe.onTouchStart} onTouchEnd={swipe.onTouchEnd}>
          <PullToRefresh onRefresh={store.refresh} loading={store.loading}>
            <div data-export-root>{body}</div>
            {footer}
          </PullToRefresh>
        </div>
        <TabBar current={tab} onTab={setTab} accent={accent}/>
        <window.LiveAIModal
          open={liveAIOpen}
          onClose={() => setLiveAIOpen(false)}
          sales={sales} traffic={traffic} ratio={ratio}
          period={period}
          screenName={tab === 'sales' ? 'Sales' : tab === 'traffic' ? 'Traffic' : 'Overview'}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</body>
</html>
