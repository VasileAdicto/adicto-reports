<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f1ead8"/>
<title>ADICTO Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f1ead8; min-height: 100vh; }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; color: #1a1510;
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain; }
  * { box-sizing: border-box; }
  button:focus { outline: none; }
  ::-webkit-scrollbar { display: none; }
  @media (min-width: 520px) {
    body { padding: 24px 0; }
    #root { max-width: 420px; margin: 0 auto; background: #f1ead8;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 20px 60px rgba(0,0,0,0.12);
      border-radius: 28px; overflow: hidden; min-height: calc(100vh - 48px); }
  }
  @media (max-width: 519px) { #root { min-height: 100vh; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
<script>
  window.ADICTO_CONFIG = {
    apiUrl: 'https://script.google.com/macros/s/AKfycbwD65o7RNMwU1QSVtJqrEEJCQjB-O1Zo3DrzGRvnTHDS7XXQsgKcQ3xAFJIQG4xyNW4fQ/exec',
  };
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
<div id="root">
  <div style="padding:80px 40px;text-align:center;font-family:'JetBrains Mono',monospace;color:#8a7d69;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;">Loading…</div>
</div>
<script src="bundle.js"></script>
<script>
(function(){
  const { useDataStore } = window.DATA_STORE;
  const { aggregateSales, aggregateTraffic, computeRatio } = window.AGGREGATOR;
  const { SalesScreen, TrafficScreen, HomeScreen, InfoScreen, MoreScreen, EmptyState, LastUpdatedFooter, AdictoLogo } = window.SCREENS;
  const { PALETTE } = window.CHARTS;
  const { PullToRefresh } = window.PTR;
  const { LoginScreen, checkSession, clearSession } = window.AUTH;
  const MONO = '"JetBrains Mono", ui-monospace, monospace';
  const e = React.createElement;

  const TABS = [
    { id: 'home', label: 'Home', glyph: '◐' },
    { id: 'sales', label: 'Sales', glyph: '◧' },
    { id: 'traffic', label: 'Traffic', glyph: '◉' },
    { id: 'info', label: 'Info', glyph: 'ⓘ' },
    { id: 'more', label: 'More', glyph: '◈' },
  ];

  function TabBar({ current, onTab, accent }) {
    return e('div', { style: {
      position: 'sticky', bottom: 0, left: 0, right: 0,
      background: 'rgba(253, 249, 238, 0.92)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      borderTop: '1px solid ' + PALETTE.line,
      display: 'flex', padding: '5px 0 max(5px, env(safe-area-inset-bottom))',
      zIndex: 40,
    }}, TABS.map(t => {
      const active = current === t.id;
      return e('button', {
        key: t.id, onClick: () => onTab(t.id),
        style: { flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
          padding: '4px 2px', color: active ? accent : PALETTE.muted },
      }, e('div', { style: { fontSize: 16 }}, t.glyph),
         e('div', { style: { fontFamily: MONO, fontSize: 8.5, letterSpacing: 0.6,
           textTransform: 'uppercase', color: active ? PALETTE.ink : PALETTE.muted,
           fontWeight: active ? 500 : 400 }}, t.label));
    }));
  }

  function TopBar({ onRefresh, loading, source, error }) {
    const dot = source === 'live' ? '#7aa875' : source === 'cache' ? '#c4a04e' : PALETTE.muted;
    return e('div', { style: {
      position: 'sticky', top: 0, zIndex: 30,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '10px 16px', gap: 10,
      background: 'rgba(241, 234, 216, 0.92)',
      backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
      borderBottom: '1px solid ' + PALETTE.line, fontFamily: MONO,
    }},
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 }},
        e(AdictoLogo, { size: 22 }),
        e('div', { style: { fontSize: 10, letterSpacing: 1.1, textTransform: 'uppercase', color: PALETTE.ink, fontWeight: 600 }}, 'ADICTO.BIKE')
      ),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 }},
        e('div', { style: { width: 6, height: 6, borderRadius: 3,
          background: error ? '#c47862' : dot,
          animation: loading ? 'pulse 1.4s ease-in-out infinite' : 'none' }}),
        e('button', { onClick: onRefresh, disabled: loading, style: {
          background: 'transparent', border: '1px solid ' + PALETTE.line,
          borderRadius: 100, padding: '5px 11px', cursor: loading ? 'default' : 'pointer',
          fontFamily: MONO, fontSize: 9, letterSpacing: 0.8, textTransform: 'uppercase',
          color: PALETTE.ink, opacity: loading ? 0.5 : 1,
        }}, loading ? '↻' : '↻ Оновити')
      )
    );
  }

  function ErrorBanner({ error, onDismiss }) {
    if (!error) return null;
    return e('div', { style: {
      margin: '10px 16px', padding: '10px 12px',
      background: '#fdf4e8', border: '1px solid #e6c9a3', borderRadius: 10,
      fontFamily: MONO, fontSize: 10, color: '#8a5a2a', display: 'flex',
      justifyContent: 'space-between', alignItems: 'center',
    }},
      e('span', null, 'Не вдалось оновити: ' + error + '. Показую збережені дані.'),
      e('button', { onClick: onDismiss, style: { background: 'none', border: 'none', cursor: 'pointer', color: '#8a5a2a', fontSize: 14, padding: 0 }}, '×')
    );
  }

  function Skeleton() {
    return e('div', { style: { padding: '20px 16px' }},
      e('div', { style: { fontFamily: MONO, fontSize: 9, letterSpacing: 1.2, textTransform: 'uppercase', color: PALETTE.muted, marginBottom: 10 }},
        e('span', { style: { display: 'inline-block', width: 10, height: 10, border: '2px solid ' + PALETTE.line,
          borderTopColor: PALETTE.ink, borderRadius: '50%', marginRight: 8, verticalAlign: -1,
          animation: 'spin 0.8s linear infinite' }}),
        'Завантаження даних'),
      [1,2,3].map(i => e('div', { key: i, style: {
        height: 80, background: '#fffbf0', border: '1px solid ' + PALETTE.line,
        borderRadius: 12, marginBottom: 10,
        backgroundImage: 'linear-gradient(90deg, transparent, ' + PALETTE.paperLight + ', transparent)',
        backgroundSize: '200% 100%',
        animation: 'shimmer 1.8s ease-in-out infinite',
      }}))
    );
  }

  function useSwipe(tab, tabs, setTab) {
    const startX = React.useRef(null);
    const startY = React.useRef(null);
    const onTouchStart = (ev) => { startX.current = ev.touches[0].clientX; startY.current = ev.touches[0].clientY; };
    const onTouchEnd = (ev) => {
      if (startX.current == null) return;
      const dx = ev.changedTouches[0].clientX - startX.current;
      const dy = ev.changedTouches[0].clientY - startY.current;
      startX.current = startY.current = null;
      if (Math.abs(dx) < 60 || Math.abs(dy) > 40) return;
      const idx = tabs.findIndex(t => t.id === tab);
      if (idx < 0) return;
      if (dx < 0 && idx < tabs.length - 1) setTab(tabs[idx + 1].id);
      if (dx > 0 && idx > 0) setTab(tabs[idx - 1].id);
    };
    return { onTouchStart, onTouchEnd };
  }

  function App() {
    const [session, setSession] = React.useState(() => checkSession());
    if (!session) {
      return e(LoginScreen, { onLogin: (email) => setSession({ email, loggedAt: Date.now() }) });
    }
    const handleLogout = () => { clearSession(); setSession(null); };

    const store = useDataStore();
    const [tab, setTab] = React.useState(() => localStorage.getItem('adicto.tab') || 'home');
    const [period, setPeriod] = React.useState(() => localStorage.getItem('adicto.period') || 'all');
    const [customRange, setCustomRange] = React.useState(() => {
      try { return JSON.parse(localStorage.getItem('adicto.customRange') || 'null') || { from:'', to:'' }; }
      catch { return { from:'', to:'' }; }
    });
    const [errorShown, setErrorShown] = React.useState(true);
    const accent = 'rgb(92, 158, 219)';

    React.useEffect(() => { localStorage.setItem('adicto.tab', tab); }, [tab]);
    React.useEffect(() => { localStorage.setItem('adicto.period', period); }, [period]);
    React.useEffect(() => { localStorage.setItem('adicto.customRange', JSON.stringify(customRange)); }, [customRange]);

    const aggOpts = period === 'custom' && customRange.from && customRange.to
      ? { from: customRange.from, to: customRange.to }
      : period !== 'all' && period !== 'custom' ? { periodDays: parseInt(period, 10) } : {};

    const sales = React.useMemo(() =>
      store.payload?.sales?.rows ? aggregateSales(store.payload.sales.rows, aggOpts) : aggregateSales([])
    , [store.payload, period, customRange.from, customRange.to]);

    const traffic = React.useMemo(() =>
      store.payload?.traffic?.rows ? aggregateTraffic(store.payload.traffic.rows, aggOpts) : aggregateTraffic([])
    , [store.payload, period, customRange.from, customRange.to]);

    const ratio = React.useMemo(() => computeRatio(sales, traffic), [sales, traffic]);
    const hasData = store.payload && (sales.count || traffic.count);
    const swipe = useSwipe(tab, TABS, setTab);

    let body;
    if (!hasData && store.loading) { body = e(Skeleton); }
    else if (!hasData && store.error) {
      body = e('div', { style: { padding: '60px 40px', textAlign: 'center', fontFamily: MONO, maxWidth: 360, margin: '0 auto' }},
        e('div', { style: { fontSize: 32, marginBottom: 16 }}, '⚠'),
        e('div', { style: { fontSize: 14, color: PALETTE.ink, marginBottom: 12, fontWeight: 500 }}, 'Не вдалось отримати дані'),
        e('div', { style: { fontSize: 10, color: PALETTE.subtle, lineHeight: 1.6, marginBottom: 20 }}, store.error),
        e('button', { onClick: store.refresh, style: {
          background: PALETTE.ink, color: '#f1ead8', border: 'none', borderRadius: 100,
          padding: '10px 20px', fontFamily: MONO, fontSize: 10, letterSpacing: 1,
          textTransform: 'uppercase', cursor: 'pointer',
        }}, 'Спробувати ще раз')
      );
    } else if (!hasData) {
      body = e(EmptyState, { msg: 'Немає даних. Натисніть «Оновити».' });
    } else {
      body = tab === 'home' ? e(HomeScreen, { sales, traffic, accent, updated: store.payload?.updated, source: store.source })
        : tab === 'sales' ? e(SalesScreen, { data: sales, accent, period, onPeriodChange: setPeriod, customRange, onCustomChange: setCustomRange })
        : tab === 'traffic' ? e(TrafficScreen, { data: traffic, accent, period, onPeriodChange: setPeriod, customRange, onCustomChange: setCustomRange, ratio })
        : tab === 'info' ? e(InfoScreen)
        : e(MoreScreen, { userEmail: session.email, onLogout: handleLogout });
    }

    const footer = (tab !== 'more' && tab !== 'info' && hasData) ? e(LastUpdatedFooter, {
      updated: store.payload?.updated, savedAt: store.savedAt,
      source: store.source, loading: store.loading, onRefresh: store.refresh,
    }) : null;

    return e('div', { style: { minHeight: '100vh', display: 'flex', flexDirection: 'column' }},
      e(TopBar, { onRefresh: store.refresh, loading: store.loading, source: store.source, error: errorShown ? store.error : null }),
      (errorShown && store.error && hasData) ? e(ErrorBanner, { error: store.error, onDismiss: () => setErrorShown(false) }) : null,
      e('div', { style: { flex: 1 }, onTouchStart: swipe.onTouchStart, onTouchEnd: swipe.onTouchEnd },
        e(PullToRefresh, { onRefresh: store.refresh, loading: store.loading },
          body, footer)
      ),
      e(TabBar, { current: tab, onTab: setTab, accent })
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
</script>
</body>
</html>
